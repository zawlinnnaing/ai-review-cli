stages:
  - build
  - release
  - package

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

# ─── Semantic Release ────────────────────────────────────────────────────────
# Runs only on the main branch and publishes a new version when conventional
# commits warrant one (feat → minor, fix/refactor/perf → patch, BREAKING → major).
#
# Required CI/CD variables (set in GitLab → Settings → CI/CD → Variables):
#   GL_TOKEN   – GitLab personal/project access token with api + write_repository + packages scopes

release:
  stage: release
  image: node:20-alpine
  variables:
    GIT_DEPTH: 0 # semantic-release needs the full git history
    NPM_TOKEN: $GL_TOKEN # @semantic-release/npm requires NPM_TOKEN; reuse GL_TOKEN which is already scoped to the GitLab Package Registry
  before_script:
    - apk add --no-cache git
    # Authenticate git pushes (used by @semantic-release/git to commit CHANGELOG)
    - git config user.email "${GITLAB_USER_EMAIL:-ci@semantic-release}"
    - git config user.name "${GITLAB_USER_NAME:-semantic-release}"
    - git remote set-url origin "https://gitlab-ci-token:${GL_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    # Configure npm to publish to the GitLab Package Registry for this project
    - echo "@sertiscorp:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/" >> .npmrc
    - echo "${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${GL_TOKEN}" >> .npmrc
  script:
    - npm ci
    - npm run build
    - npx semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

# ─── Binary packaging ────────────────────────────────────────────────────────
# Runs only on version tags created by semantic-release (e.g. v1.2.3).
# At this point package.json already contains the new version because
# @semantic-release/git committed it before the tag was created.
#
# Binaries are uploaded to the GitLab Generic Package Registry and then
# linked as downloadable assets on the existing GitLab release.
package:
  stage: package
  image: node:20-alpine
  before_script:
    - apk add --no-cache curl
  script:
    - npm ci
    - npm run build
    - npm run package
    # Derive the plain version string (strip leading "v")
    - export VERSION=${CI_COMMIT_TAG#v}
    # Upload each binary to the Generic Package Registry
    - |
      for binary in \
          artifacts/ai-review-linux-x64 \
          artifacts/ai-review-linux-arm64 \
          artifacts/ai-review-macos-x64 \
          artifacts/ai-review-macos-arm64 \
          artifacts/ai-review-win-x64.exe; do
        filename=$(basename "$binary")
        curl --fail --silent --show-error \
          --upload-file "$binary" \
          --header "PRIVATE-TOKEN: ${GL_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ai-review-cli/${VERSION}/${filename}"
        echo "Uploaded ${filename}"
      done
    # Attach each binary as an asset link on the GitLab release
    - |
      for filename in \
          ai-review-linux-x64 \
          ai-review-linux-arm64 \
          ai-review-macos-x64 \
          ai-review-macos-arm64 \
          ai-review-win-x64.exe; do
        curl --fail --silent --show-error \
          --request POST \
          --header "PRIVATE-TOKEN: ${GL_TOKEN}" \
          --header "Content-Type: application/json" \
          --data "{\"name\": \"${filename}\", \"url\": \"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ai-review-cli/${VERSION}/${filename}\", \"link_type\": \"package\"}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links"
        echo "Linked ${filename} to release ${CI_COMMIT_TAG}"
      done
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
