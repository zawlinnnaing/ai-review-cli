stages:
  - build

# ─── Build & Validate ───────────────────────────────────────────────────────

build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run lint
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
